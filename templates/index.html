<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vectorizer Engine</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ AI Vectorizer Engine</h1>
            <p>Convert raster graphics into clean, scalable cut-paths and vector shapes for sublimation and print workflows.</p>
        </header>

        <div class="app-layout">
            <aside class="sidebar">
                <h3>🛠️ Settings</h3>
                <form id="vectorForm">
                    <label for="color_mode">Color Mode:</label>
                    <select id="color_mode" name="color_mode">
                        <option value="color">Full Color</option>
                        <option value="binary">Binary (B&W / Cut Path)</option>
                    </select>

                    <label for="corner_threshold">Corner Sharpness (0-180):</label>
                    <input type="range" id="corner_threshold" name="corner_threshold" min="0" max="180" value="60">
                    <span id="corner_val">60</span>

                    <label for="filter_speckle">Noise Filter (px):</label>
                    <input type="range" id="filter_speckle" name="filter_speckle" min="1" max="50" value="4">
                    <span id="speckle_val">4</span>
                </form>
            </aside>

            <main class="main-content">
                <div id="drop-zone" class="drop-zone">
                    <p>Drag & Drop a PNG or JPG here</p>
                    <input type="file" id="file-input" accept="image/png, image/jpeg, image/webp" hidden>
                    <button class="btn" onclick="document.getElementById('file-input').click()">Browse Files</button>
                </div>
                
                <div id="loading" class="hidden">
                    <p>Calculating mathematical paths... Please wait.</p>
                </div>

                <div id="result-zone" class="hidden">
                    <h3>Vector Output</h3>
                    <div id="svg-container"></div>
                    <button id="download-btn" class="btn success">💾 Download Clean SVG</button>
                </div>
            </main>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
